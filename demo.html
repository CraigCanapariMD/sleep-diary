  --color-on-accent:  var(--brand-on-accent);
  --color-border:     var(--brand-border);
  --color-warning:    var(--brand-warning);

    --brand-muted:          #B5AFA6;
    --brand-muted-graphic:  #B5AFA6;

/* ============================================================
   App styles — reference semantic tokens only
   ============================================================ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--color-bg);color:var(--color-text);
  font-family:var(--brand-font-body);
  font-size:17px;line-height:var(--brand-line-body);
  padding-bottom:88px;
  -webkit-text-size-adjust:100%;
}
header.app{
  background:var(--color-accent);color:var(--color-on-accent);
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 14px;
  /* stay under the iOS status bar while content scrolls beneath */
  position:sticky;top:0;z-index:30;
}
header.app h1{margin:0;font-size:19px;font-weight:800;letter-spacing:var(--brand-tracking-h1);font-family:var(--brand-font-heading)}
header.app .sub{font-size:13.5px;opacity:.85;margin-top:2px;font-family:var(--brand-font-heading)}
main{max-width:680px;margin:0 auto;padding:14px}
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--brand-radius-lg);padding:14px;margin-bottom:12px}
.card h2{margin:0 0 8px;font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--color-text-muted);font-family:var(--brand-font-heading)}
.card h2 .big{display:block;text-transform:none;letter-spacing:var(--brand-tracking-h1);color:var(--color-text);font-size:18px;margin-top:2px;font-weight:700}
.card.tint{background:var(--brand-accent-tint);border-color:var(--brand-accent-border)}
.card.warn{background:var(--brand-warning-tint);border-color:var(--brand-warning-border)}
button{font-family:var(--brand-font-heading);font-size:15.5px;cursor:pointer;border:none;border-radius:var(--brand-radius);padding:11px 14px}
.btn-primary{

.btn-secondary{background:var(--color-bg);border:1px solid var(--color-border);color:var(--color-text);font-weight:600}
.btn-ghost{background:transparent;color:var(--color-link);font-weight:700;padding:8px 10px}
.btn-danger{background:transparent;color:var(--color-warning);font-weight:600}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-row>button{flex:1}
label{display:block;font-size:13px;font-weight:700;color:var(--color-text-muted);margin:10px 0 4px;font-family:var(--brand-font-heading)}

/* DEMO BUILD — this block is the only difference from index.html.
   Pre-loads 7 nights of sample data on first open, for showing colleagues.
   Regenerated by scripts/build.mjs — edit there, not here. */
(function(){
  try{
    if (localStorage.getItem("peds-sleep-diary-demo-seeded")) return;
    if (localStorage.getItem("peds-sleep-diary-v1")) return;
    var today = new Date();
    function dAgo(k){
      var t = new Date(today.getFullYear(), today.getMonth(), today.getDate()-k);
      return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
    }
    var demo = [
      {lo:"19:45",on:"20:10",wk:"06:20",ob:"06:35",aw:[{time:"01:30",dur:20,help:"room"}],naps:[{inBed:"12:40",asleep:"12:55",woke:"14:10",out:"14:15"}]},
      {lo:"20:05",on:"20:50",wk:"06:05",ob:"06:25",aw:[{time:"00:45",dur:15,help:"fed"},{time:"03:20",dur:25,help:"bed"}],naps:[{inBed:"13:00",asleep:"13:10",woke:"14:20",out:"14:25"}]},
      {lo:"19:50",on:"20:15",wk:"06:30",ob:"06:40",aw:[],naps:[{inBed:"12:30",asleep:"12:50",woke:"13:55",out:"14:00"}]},
      {lo:"20:30",on:"21:15",wk:"06:15",ob:"06:45",aw:[{time:"02:10",dur:35,help:"bed"}],naps:[]},
      {lo:"19:40",on:"20:00",wk:"06:25",ob:"06:35",aw:[{time:"01:00",dur:10,help:"none"}],naps:[{inBed:"12:45",asleep:"13:00",woke:"14:30",out:"14:35"}]},
      {lo:"20:00",on:"20:35",wk:"05:50",ob:"06:20",aw:[{time:"23:50",dur:15,help:"room"},{time:"03:40",dur:20,help:"room"}],naps:[{inBed:"13:10",asleep:"13:25",woke:"14:15",out:"14:20"}]},
      {lo:"19:55",on:"20:20",wk:"06:10",ob:"06:30",aw:[],naps:[{inBed:"12:50",asleep:"13:05",woke:"14:25",out:"14:30"}]}
    ];
    var entries = {};
    demo.forEach(function(d,i){
      var date = dAgo(demo.length - i);
      entries[date] = { date:date, lightsOut:d.lo, onset:d.on, wake:d.wk, outOfBed:d.ob,
        awakenings:d.aw, naps:d.naps, notes: i===3 ? "Skipped nap at daycare; bedtime battle" : "" };
    });
    var state = { version:2, activeChild:"c1",
      children:{ c1:{ settings:{ initials:"Demo", ageBand:"toddler" }, entries:entries } },
      meta:{ lastBackupAt:null }, drive:{ fileId:null, lastBackupAt:null } };
    localStorage.setItem("peds-sleep-diary-v1", JSON.stringify(state));
    localStorage.setItem("peds-sleep-diary-demo-seeded","1");
  }catch(e){}
})();

<script>
"use strict";

/* ============================================================
   Pediatric Sleep Diary — single-file web app (+ sw.js/manifest)
   Data model (v2): per child, one entry per calendar day D.
     - naps: naps taken during day D (before that night's bedtime)
     - night: the night of D (evening D -> morning D+1)
   All clock times are stored "HH:MM" (24h) and mapped onto a
   noon-to-noon axis: minutes-from-noon (mfn), 0 = 12:00 PM day D,
   1439 = 11:59 AM day D+1. Normal sleep never wraps this axis,
   so plain arithmetic means/SDs are valid.
   ============================================================ */

/* ---------- native shell (Capacitor) detection ----------
   The same file runs three ways: web page, installed PWA, and inside the
   Capacitor iOS/Android shell. Native-only features (reminder notifications,
   share sheet) feature-detect so the web build is untouched. */
const CAP = window.Capacitor;
const IS_NATIVE = !!(CAP && CAP.isNativePlatform && CAP.isNativePlatform());
function capPlugin(name){
  return (IS_NATIVE && CAP.Plugins && CAP.Plugins[name]) ? CAP.Plugins[name] : null;
}

/* ---------- storage: IndexedDB primary, localStorage mirror ----------
   iOS evicts localStorage far more readily than IndexedDB; we write both
   and read whichever survives. navigator.storage.persist() asks the
   browser not to evict at all. */
const STORE_KEY = "peds-sleep-diary-v1";
const IDB_NAME = "peds-sleep-diary", IDB_STORE = "kv";
function idbOpen(){
  return new Promise((res,rej)=>{
    const q = indexedDB.open(IDB_NAME, 1);
    q.onupgradeneeded = ()=> q.result.createObjectStore(IDB_STORE);
    q.onsuccess = ()=> res(q.result);
    q.onerror = ()=> rej(q.error);
  });
}
async function idbGet(k){
  const db = await idbOpen();
  try{
    return await new Promise((res,rej)=>{
      const t = db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).get(k);
      t.onsuccess = ()=>res(t.result==null? null : t.result);
      t.onerror = ()=>rej(t.error);
    });
  } finally { db.close(); }
}
async function idbSet(k,v){
  const db = await idbOpen();
  try{
    return await new Promise((res,rej)=>{
      const tx = db.transaction(IDB_STORE,"readwrite");
      tx.objectStore(IDB_STORE).put(v,k);
      tx.oncomplete = ()=>res();
      tx.onerror = ()=>rej(tx.error);
    });
  } finally { db.close(); }
}
const KV = {
  async get(k){
    let idbVal = null;
    try { idbVal = await idbGet(k); } catch(e){}
    if (idbVal != null) return idbVal;
    try { return window.localStorage.getItem(k); } catch(e){ return null; }
  },
  async set(k,v){
    try { await idbSet(k,v); } catch(e){ console.error("idb.set",e); }
    try { window.localStorage.setItem(k,v); } catch(e){}
  }
};

/* ---------- state (v2: multiple children) ---------- */
let state = null;
function blankChild(){ return { settings:{ initials:"", ageBand:"" }, entries:{} }; }
function blankState(){
  return { version:2, activeChild:"c1", children:{ c1: blankChild() },
           meta:{ lastBackupAt:null, reminder:{ enabled:false, time:"07:00" } },
           drive:{ fileId:null, lastBackupAt:null } };
}
function migrateState(s){
  if (!s || typeof s!=="object") return blankState();
  if (s.version === 2){
    if (!s.children || !Object.keys(s.children).length) s.children = { c1: blankChild() };
    if (!s.children[s.activeChild]) s.activeChild = Object.keys(s.children)[0];
    if (!s.meta) s.meta = { lastBackupAt:null };
    if (!s.meta.reminder) s.meta.reminder = { enabled:false, time:"07:00" };
    if (!s.drive) s.drive = { fileId:null, lastBackupAt:null };
    Object.values(s.children).forEach(c=>{
      if (!c.settings) c.settings = { initials:"", ageBand:"" };
      if (c.settings.ageBand === undefined) c.settings.ageBand = "";
      if (!c.entries) c.entries = {};
    });
    return s;
  }
  /* v1: { settings:{initials, driveFileId?, lastDriveBackup?}, entries:{} } */
  const out = blankState();
  out.children.c1.settings.initials = (s.settings && s.settings.initials) || "";
  out.children.c1.entries = s.entries || {};
  out.drive.fileId = (s.settings && s.settings.driveFileId) || null;
  out.drive.lastBackupAt = (s.settings && s.settings.lastDriveBackup) || null;
  return out;
}
async function loadState(){
  let parsed = null;
  const raw = await KV.get(STORE_KEY);
  if (raw){ try { parsed = JSON.parse(raw); } catch(e){} }
  state = migrateState(parsed);
}
let saveTimer = null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ KV.set(STORE_KEY, JSON.stringify(state)); }, 250);
}
function cur(){ return state.children[state.activeChild]; }

/* ---------- NSF sleep duration recommendations ----------
   Hirshkowitz et al., Sleep Health 2015;1(1):40-43 — re-certified by
   Dzierzewski et al., Sleep Health 2026 (10-year systematic review).
   recLo/recHi = recommended hours; mayLo/mayHi = outer bounds of the
   "may be appropriate" band. Outside mayLo–mayHi = "not recommended". */
const AGE_BANDS = {
  newborn:   { label:"Newborn (0–3 months)",       recLo:14, recHi:17, mayLo:11, mayHi:19 },
  infant:    { label:"Infant (4–11 months)",        recLo:12, recHi:15, mayLo:10, mayHi:18 },
  toddler:   { label:"Toddler (1–2 years)",         recLo:11, recHi:14, mayLo:9,  mayHi:16 },
  preschool: { label:"Preschooler (3–5 years)",     recLo:10, recHi:13, mayLo:8,  mayHi:14 },
  school:    { label:"School age (6–13 years)",     recLo:9,  recHi:11, mayLo:7,  mayHi:12 },
  teen:      { label:"Teenager (14–17 years)",      recLo:8,  recHi:10, mayLo:7,  mayHi:11 },
  youngadult:{ label:"Young adult (18–25 years)",   recLo:7,  recHi:9,  mayLo:6,  mayHi:11 }
};
const NSF_CITATION = "National Sleep Foundation recommendations (Hirshkowitz et al., Sleep Health 2015; re-certified Dzierzewski et al., Sleep Health 2026).";
/* Classify mean 24-h sleep (minutes) against the child's age band. */
function nsfCompare(tst24min){
  const band = AGE_BANDS[cur().settings.ageBand];
  if (!band || isNaN(tst24min)) return null;
  const h = tst24min/60;
  const range = band.recLo+"–"+band.recHi+" h";
  let cls, text;
  if (h >= band.recLo && h <= band.recHi){
    cls = "ok";  text = "Within the recommended range ("+range+") for this age.";
  } else if (h < band.recLo && h >= band.mayLo){
    cls = "may"; text = "Below the recommended range ("+range+"), in the “may be appropriate” band for this age.";
  } else if (h > band.recHi && h <= band.mayHi){
    cls = "may"; text = "Above the recommended range ("+range+"), in the “may be appropriate” band for this age.";
  } else if (h < band.mayLo){
    cls = "out"; text = "Below the “may be appropriate” band for this age (recommended "+range+").";
  } else {
    cls = "out"; text = "Above the “may be appropriate” band for this age (recommended "+range+").";
  }
  return { cls, text, band };
}

/* ---------- time helpers ---------- */
function hm(t){ const [h,m]=t.split(":").map(Number); return h*60+m; }           // minutes from midnight
function mfn(t){ return ((hm(t) - 720) + 1440) % 1440; }                          // minutes from noon
function clock(mfnVal){                                                            // mfn -> "h:mm AM/PM"
  let m = ((Math.round(mfnVal) % 1440)+1440)%1440;
  let mm = (m + 720) % 1440;
  let h = Math.floor(mm/60), min = mm%60;
  const ap = h >= 12 ? "PM" : "AM";
  let h12 = h % 12; if (h12===0) h12 = 12;
  return h12 + ":" + String(min).padStart(2,"0") + " " + ap;
}
function clockFromHM(t){ return clock(mfn(t)); }
function dur(mins){
  mins = Math.round(mins);
  if (mins < 0) mins = 0;
  const h = Math.floor(mins/60), m = mins%60;
  if (h===0) return m + " min";
  return h + " h " + (m? m+" min" : "");
}
function isoToday(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtDate(iso){
  const [y,mo,d]=iso.split("-").map(Number);
  const dt = new Date(y,mo-1,d);
  return dt.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
}
function fmtDateShort(iso){
  const [y,mo,d]=iso.split("-").map(Number);
  return new Date(y,mo-1,d).toLocaleDateString(undefined,{month:"numeric",day:"numeric"});
}
function addDays(iso, k){
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y, m-1, d + k);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}
function mean(a){ return a.length ? a.reduce((s,x)=>s+x,0)/a.length : NaN; }
function sd(a){
  if (a.length < 2) return NaN;
  const m = mean(a);
  return Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1));
}

/* ---------- per-night computation ---------- */
const HELP_LABELS = {
  none:"No help needed", room:"Comforted in room", fed:"Fed",
  bed:"Brought to parents' bed", other:"Other"
};
function computeNight(e){
  const out = { valid:false, warnings:[] };
  if (!(e.lightsOut && e.onset && e.wake && e.outOfBed)) return out;
  const lo = mfn(e.lightsOut), on = mfn(e.onset), wk = mfn(e.wake), ob = mfn(e.outOfBed);
  if (on < lo) out.warnings.push("Sleep onset is before lights out.");
  if (wk <= on) out.warnings.push("Morning wake time is not after sleep onset.");
  if (ob < wk) out.warnings.push("Out of bed is before final wake time.");
  const waso = (e.awakenings||[]).reduce((s,a)=> s + (Number(a.dur)||0), 0);
  const nAw = (e.awakenings||[]).length;
  const nHelp = (e.awakenings||[]).filter(a=> a.help && a.help!=="none").length;
  const tib = ob - lo;
  const sol = on - lo;
  const spt = wk - on;                      // sleep period time
  const tst = Math.max(0, spt - waso);      // night total sleep time
  const se  = tib > 0 ? (tst / tib) * 100 : NaN;
  const mid = on + spt/2;                   // midsleep, mfn
  // naps
  let napSleep = 0, napInBed = 0, nNaps = 0;
  (e.naps||[]).forEach(n=>{
    if (n.asleep && n.woke){
      const s = mfn(n.asleep), w = mfn(n.woke);
      if (w > s){ napSleep += (w - s); nNaps++; }
    }
    if (n.inBed && n.out){
      const i = mfn(n.inBed), o = mfn(n.out);
      if (o > i) napInBed += (o - i);
    }
  });
  Object.assign(out,{ valid:true, lo,on,wk,ob, tib,sol,spt,tst,se,waso,nAw,nHelp,mid,
                      napSleep, napInBed, nNaps, tst24: tst + napSleep });
  return out;
}

function sortedEntries(){
  return Object.values(cur().entries).sort((a,b)=> a.date < b.date ? -1 : 1);
}

/* ---------- summary across nights ---------- */
function computeSummary(){
  const rows = sortedEntries().map(e=>({e, c:computeNight(e)})).filter(r=>r.c.valid);
  if (!rows.length) return null;
  const g = k => rows.map(r=>r.c[k]);
  const s = {
    n: rows.length,
    first: rows[0].e.date, last: rows[rows.length-1].e.date,
    lightsOut:{ m:mean(g("lo")), sd:sd(g("lo")) },
    onset:{ m:mean(g("on")), sd:sd(g("on")) },
    wake:{ m:mean(g("wk")), sd:sd(g("wk")) },
    outOfBed:{ m:mean(g("ob")), sd:sd(g("ob")) },
    mid:{ m:mean(g("mid")), sd:sd(g("mid")) },
    sol:{ m:mean(g("sol")), sd:sd(g("sol")) },
    tib:{ m:mean(g("tib")) },
    tst:{ m:mean(g("tst")), sd:sd(g("tst")) },
    se:{ m:mean(g("se")), sd:sd(g("se")) },
    waso:{ m:mean(g("waso")) },
    nAw:{ m:mean(g("nAw")), tot: g("nAw").reduce((a,b)=>a+b,0) },
    nHelp:{ m:mean(g("nHelp")), tot: g("nHelp").reduce((a,b)=>a+b,0) },
    napSleep:{ m:mean(g("napSleep")) },
    nNaps:{ m:mean(g("nNaps")) },
    tst24:{ m:mean(g("tst24")) },
    rows
  };
  return s;
}

/* ---------- sleep/wake raster + Sleep Regularity Index ----------
   Build a 5-min-resolution sleep(1)/wake(0) vector per diary day
   (noon->noon, 288 epochs), from night sleep minus awakenings, plus naps.
   SRI compares consecutive calendar days epoch-by-epoch:
   SRI = -100 + 200 * P(same state at same clock time on consecutive days). */
const EPOCH = 5, NEP = 1440/EPOCH;
function rasterFor(e){
  const c = computeNight(e);
  if (!c.valid) return null;
  const v = new Array(NEP).fill(0);
  const set = (a,b,val)=>{
    let i0 = Math.max(0, Math.floor(a/EPOCH)), i1 = Math.min(NEP, Math.ceil(b/EPOCH));
    for (let i=i0;i<i1;i++) v[i]=val;
  };
  set(c.on, c.wk, 1);
  (e.awakenings||[]).forEach(a=>{
    if (a.time && a.dur){ const t = mfn(a.time); set(t, t + Number(a.dur), 0); }
  });
  (e.naps||[]).forEach(n=>{
    if (n.asleep && n.woke){ const s=mfn(n.asleep), w=mfn(n.woke); if (w>s) set(s,w,1); }
  });
  return v;
}
function computeSRI(){
  const byDate = {};
  sortedEntries().forEach(e=>{ const r = rasterFor(e); if (r) byDate[e.date] = r; });
  let same=0, total=0;
  Object.keys(byDate).forEach(d=>{
    const nx = byDate[addDays(d,1)];
    if (!nx) return;
    const cur = byDate[d];
    for (let i=0;i<NEP;i++){ if (cur[i]===nx[i]) same++; total++; }
  });
  if (!total) return null;
  return -100 + 200*(same/total);
}
/* ============================================================
   UI
   ============================================================ */
const $ = sel => document.querySelector(sel);
function el(tag, attrs, ...kids){
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs){
    if (k==="class") n.className = attrs[k];
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), attrs[k]);
    else if (k==="html") n.innerHTML = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach(k=>{ if (k==null) return; n.append(k.nodeType? k : document.createTextNode(k)); });
  return n;
}
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* ---------- tabs ---------- */
function switchTab(name){
  document.querySelectorAll("nav.tabs button").forEach(x=>{
    const on = x.dataset.tab === name;
    x.classList.toggle("active", on);
    x.setAttribute("aria-selected", on ? "true" : "false");
  });
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("#view-"+name).classList.add("active");
  render(name);
  window.scrollTo(0,0);
}
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click", ()=> switchTab(b.dataset.tab));
});

function render(tab){
  if (!tab) tab = document.querySelector("nav.tabs button.active").dataset.tab;
  $("#hdrSub").textContent = headerSub();
  if (tab==="diary") renderDiary();
  if (tab==="chart") renderChart();
  if (tab==="summary") renderSummary();
  if (tab==="share") renderShare();
}
function headerSub(){
  const n = sortedEntries().length;
  const who = cur().settings.initials ? "Child: "+cur().settings.initials+" · " : "";
  return who + (n ? n + (n===1?" night":" nights") + " recorded" : "Track your child's sleep, night by night");
}

/* ---------- native: daily reminder notification ----------
   Local-only (no server): the shell schedules a repeating notification on
   the phone itself. No-op on the web / PWA builds. */
async function applyReminder(){
  const LN = capPlugin("LocalNotifications");
  if (!LN) return;
  const r = state.meta.reminder;
  try { await LN.cancel({ notifications:[{ id:1 }] }); } catch(e){}
  if (!r.enabled) return;
  const perm = await LN.requestPermissions();
  if (!perm || perm.display !== "granted"){
    r.enabled = false; saveState();
    toast("Notifications are blocked for this app");
    return;
  }
  const [h,m] = (r.time||"07:00").split(":").map(Number);
  await LN.schedule({ notifications:[{
    id:1,
    title:"Sleep diary",
    body:"Add last night — it takes about a minute.",
    schedule:{ on:{ hour:h, minute:m }, allowWhileIdle:true }
  }]});
}

/* ---------- native: share a file via the OS share sheet ----------
   Blob-anchor downloads don't work inside the native webview; write the
   file to the app cache and hand it to the share sheet instead.
   Returns false on web so callers fall back to the download link. */
async function shareFileNative(filename, data){
  const FS = capPlugin("Filesystem"), SH = capPlugin("Share");
  if (!FS || !SH) return false;
  const res = await FS.writeFile({ path:filename, data, directory:"CACHE", encoding:"utf8" });
  await SH.share({ title:filename, url:res.uri });
  return true;
}

/* ---------- install prompt ----------
   Android/Chrome fires beforeinstallprompt, letting us offer a one-tap
   install. iOS has no install API — Apple requires the manual
   Share → Add to Home Screen, so we show instructions instead. */
let installPromptEvent = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  installPromptEvent = e;
  const onDiary = document.querySelector("nav.tabs button.active")?.dataset.tab === "diary";
  if (onDiary && !editing) renderDiary();
});
function isStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches
      || window.navigator.standalone === true;
}
function installBanner(){
  if (IS_NATIVE || isStandalone() || state.meta.installDismissed) return null;
  const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const b = el("div",{class:"banner"});
  b.append(el("b",null,"Add this diary to your home screen. "),
    "It becomes an app icon, works without internet, and keeps your entries safe on this phone.");
  const row = el("div",{style:"display:flex;gap:8px"});
  if (installPromptEvent){
    row.append(el("button",{class:"btn-primary",style:"width:auto",onclick:async()=>{
      const evt = installPromptEvent; installPromptEvent = null;
      try { await evt.prompt(); } catch(e){}
      renderDiary();
    }},"Install app"));
  } else if (isiOS){
    b.append(el("div",{class:"hint",style:"margin-top:6px"},
      "Tap the Share button (the square with an arrow, at the bottom of Safari), scroll down, and choose “Add to Home Screen.”"));
  } else {
    b.append(el("div",{class:"hint",style:"margin-top:6px"},
      "In your browser's menu, choose “Add to Home Screen” or “Install app.”"));
  }
  row.append(el("button",{class:"btn-secondary",onclick:()=>{
    state.meta.installDismissed = true; saveState(); renderDiary();
  }},"Not now"));
  b.append(row);
  return b;
}

/* ---------- diary view ---------- */
let editing = null;      // date being edited, or "__new__"
let newEntryDate = null; // preset date when adding a missed night

function missingNights(){
  const entries = sortedEntries();
  if (!entries.length) return [];
  const yesterday = addDays(isoToday(), -1);
  const out = [];
  let d = entries[0].date;
  const end = yesterday > entries[entries.length-1].date ? yesterday : entries[entries.length-1].date;
  while (d <= end){
    if (!cur().entries[d]) out.push(d);
    d = addDays(d, 1);
  }
  return out;
}
function backupDue(){
  const n = sortedEntries().length;
  if (n < 5) return false;
  const stamps = [state.meta.lastBackupAt, state.drive.lastBackupAt].filter(Boolean);
  if (!stamps.length) return true;
  const latest = stamps.sort().pop();
  return (Date.now() - new Date(latest).getTime()) > 7*24*3600*1000;
}

function renderDiary(){
  const v = $("#view-diary"); v.innerHTML = "";
  if (editing){
    const preset = newEntryDate; newEntryDate = null;
    v.append(entryForm(editing === "__new__" ? null : cur().entries[editing], preset));
    return;
  }

  /* install prompt (browser only; hidden once installed or dismissed) */
  const inst = installBanner();
  if (inst) v.append(inst);

  /* backup nudge */
  if (backupDue()){
    v.append(el("div",{class:"banner"},
      el("b",null,"Protect your diary. "),
      "You have "+sortedEntries().length+" nights recorded and no recent backup. A backup keeps your data safe if this browser's storage is cleared.",
      el("div",null, el("button",{class:"btn-secondary",onclick:()=>switchTab("share")},"Back up now"))
    ));
  }

  /* child / setup card */
  const ids = Object.keys(state.children);
  const setup = el("div",{class:"card"});
  setup.append(el("h2",null,"Setup"));
  if (ids.length > 1 || true){
    const sel = el("select",{onchange:ev=>{
      if (ev.target.value === "__add__"){
        const id = "c"+Date.now();
        state.children[id] = blankChild();
        state.activeChild = id;
        saveState(); render();
        return;
      }
      state.activeChild = ev.target.value; saveState(); render();
    }});
    ids.forEach(id=>{
      const c = state.children[id];
      sel.append(el("option",{value:id, ...(id===state.activeChild?{selected:""}:{})},
        (c.settings.initials || "Unnamed child") + " ("+Object.keys(c.entries).length+" nights)"));
    });
    sel.append(el("option",{value:"__add__"},"+ Add another child…"));
    setup.append(el("label",null,"Child"), sel);
  }
  setup.append(
    el("label",null,"Child's initials (no full names — this keeps the diary private)"),
    el("input",{type:"text", maxlength:"6", value:cur().settings.initials||"",
      oninput:e=>{ cur().settings.initials = e.target.value.trim(); saveState(); $("#hdrSub").textContent = headerSub(); }}),
    el("label",null,"Child's age group (adds sleep-need comparison to the report)"),
    el("select",{onchange:e=>{ cur().settings.ageBand = e.target.value; saveState(); }},
      el("option",{value:""},"Not set — no comparison shown"),
      Object.keys(AGE_BANDS).map(k=>
        el("option",{value:k, ...(cur().settings.ageBand===k?{selected:""}:{})}, AGE_BANDS[k].label))),
    el("div",{class:"hint"},"Everything you enter stays on this device until you choose to share it.")
  );
  if (IS_NATIVE){
    const r = state.meta.reminder;
    const timeInp = el("input",{type:"time", value:r.time||"07:00", style:"max-width:140px",
      oninput:ev=>{ r.time = ev.target.value || "07:00"; saveState(); if (r.enabled) applyReminder(); }});
    setup.append(
      el("label",null,"Daily reminder (a notification on this phone only)"),
      el("div",{style:"display:flex;gap:8px;align-items:center"},
        timeInp,
        el("button",{class: r.enabled ? "btn-primary" : "btn-secondary", style:"width:auto;flex:0 0 auto",
          onclick:async ev=>{
            r.enabled = !r.enabled; saveState();
            await applyReminder();
            renderDiary();
            if (r.enabled && state.meta.reminder.enabled) toast("Reminder set for "+clockFromHM(r.time||"07:00"));
          }}, r.enabled ? "Reminder on" : "Turn on"))
    );
  }
  if (ids.length > 1){
    setup.append(el("button",{class:"btn-danger",style:"margin-top:8px;padding-left:0",onclick:()=>{
      const c = cur();
      if (confirm("Remove "+(c.settings.initials||"this child")+" and their "+Object.keys(c.entries).length+" recorded nights from this device?")){
        delete state.children[state.activeChild];
        state.activeChild = Object.keys(state.children)[0];
        saveState(); render();
      }
    }},"Remove this child…"));
  }
  v.append(setup);

  v.append(el("button",{class:"btn-primary",onclick:()=>{ editing="__new__"; renderDiary(); }},"+ Add last night"));

  /* missed nights */
  const missing = missingNights();
  if (missing.length){
    const mc = el("div",{class:"card",style:"margin-top:12px"});
    mc.append(el("h2",null,"Missing nights"));
    mc.append(el("div",{class:"hint",style:"margin:0"},
      missing.length + (missing.length===1?" night has":" nights have") +
      " no entry. Tap to fill in while you still remember — gaps also break the regularity index."));
    const chips = el("div",{class:"chips"});
    missing.slice(-7).forEach(d=>{
      chips.append(el("button",{onclick:()=>{ editing="__new__"; newEntryDate=d; renderDiary(); }},"+ "+fmtDate(d)));
    });
    if (missing.length > 7) chips.append(el("span",{class:"hint"},"…and "+(missing.length-7)+" more"));
    mc.append(chips);
    v.append(mc);
  }

  const list = el("div",{class:"card",style:"margin-top:12px"});
  list.append(el("h2",null,"Recorded nights"));
  const entries = sortedEntries().slice().reverse();
  if (!entries.length){
    list.append(el("div",{class:"empty"},"No nights yet. Each morning, tap “Add last night” — it takes about a minute."));
  } else {
    entries.forEach(e=>{
      const c = computeNight(e);
      const meta = c.valid
        ? clockFromHM(e.lightsOut)+" → "+clockFromHM(e.outOfBed)+" · slept "+dur(c.tst)
          + (c.nAw? " · "+c.nAw+" waking"+(c.nAw>1?"s":"") : "")
          + (e.naps && e.naps.length ? " · "+e.naps.length+" nap"+(e.naps.length>1?"s":"") : "")
        : "Incomplete entry";
      list.append(el("div",{class:"entry-row",onclick:()=>{ editing=e.date; renderDiary(); }},
        el("div",null, el("div",{class:"d"},"Night of "+fmtDate(e.date)), el("div",{class:"meta"},meta)),
        el("div",{class:"chev"},"›")
      ));
    });
  }
  v.append(list);
}

/* ---------- entry form ---------- */
function lastEntryBefore(dateIso){
  const prior = sortedEntries().filter(x=> x.date < dateIso);
  return prior.length ? prior[prior.length-1] : null;
}
function entryForm(existing, presetDate){
  const targetDate = presetDate || addDays(isoToday(), -1); // "last night" = yesterday
  /* Prefill a new entry from the most recent night — a far better prior
     than fixed defaults once the family has logged once. */
  const prev = existing ? null : lastEntryBefore(targetDate) ||
               (sortedEntries().length ? sortedEntries()[sortedEntries().length-1] : null);
  const e = existing ? JSON.parse(JSON.stringify(existing)) : {
    date: targetDate,
    lightsOut:"", onset:"", wake:"", outOfBed:"",
    awakenings:[], naps:[], notes:""
  };
  const inputs = {};
  const touched = new Set(existing ? ['lightsOut','onset','wake','outOfBed'].filter(k=>e[k]) : []);
  const card = el("div",{class:"card"});
  card.append(el("h2",null, existing? "Edit night" : "New night",
    el("span",{class:"big"},"Night of ", el("span",{id:"fDateLabel"}, fmtDate(e.date)))));

  const warn = el("div",{class:"warnmsg",id:"fWarn"});

  function timeField(labelTxt, key, opts){
    opts = opts||{};
    const defaultVal = (prev && prev[key]) || opts.defaultVal || "";
    if (!existing && !e[key] && defaultVal) e[key] = defaultVal;
    const inp = el("input",{type:"time", value:e[key]||"",
      oninput:ev=>{
        e[key]=ev.target.value; touched.add(key); showWarnings();
        if (opts.cascadeTo && !touched.has(opts.cascadeTo) && inputs[opts.cascadeTo]){
          e[opts.cascadeTo]=ev.target.value; inputs[opts.cascadeTo].value=ev.target.value;
        }
      }});
    inputs[key]=inp;
    const wrap = el("div",null, el("label",null,labelTxt), inp);
    if (opts.hint) wrap.append(el("div",{class:"hint"},opts.hint));
    return wrap;
  }
  function showWarnings(){
    const c = computeNight(e);
    warn.textContent = c.valid && c.warnings.length ? "Check times: " + c.warnings.join(" ") : "";
  }

  card.append(
    el("label",null,"Date (the evening the night began)"),
    el("input",{type:"date", value:e.date, oninput:ev=>{ e.date=ev.target.value; $("#fDateLabel").textContent = fmtDate(e.date); }}));
  /* DOM append() coerces null to the string "null" — only add the hint when it exists */
  if (prev) card.append(el("div",{class:"hint"},"Times start from your last entry ("+fmtDate(prev.date)+") — adjust what changed."));
  card.append(
    el("div",{class:"grid2"},
      timeField("Lights out / put in bed","lightsOut",{defaultVal:"20:00",cascadeTo:"onset"}),
      timeField("Fell asleep (your best guess)","onset",{defaultVal:"20:00"}),
      timeField("Woke up for the day","wake",{defaultVal:"06:30",cascadeTo:"outOfBed"}),
      timeField("Out of bed / out of crib","outOfBed",{defaultVal:"06:30"})
    ),
    warn
  );

  /* awakenings */
  const awBox = el("div");
  function awRow(a, idx){
    return el("div",{class:"sub-item"},
      el("button",{class:"btn-danger rm",onclick:()=>{ e.awakenings.splice(idx,1); redrawAw(); }},"Remove"),
      el("div",{class:"grid2"},
        el("div",null, el("label",null,"Woke at"),
          el("input",{type:"time",value:a.time||"",oninput:ev=>a.time=ev.target.value})),
        el("div",null, el("label",null,"Awake for (minutes)"),
          el("input",{type:"number",min:"0",step:"1",inputmode:"numeric",value:a.dur||"",oninput:ev=>a.dur=ev.target.value}))
      ),
      el("label",null,"Did you go in / help?"),
      el("select",{onchange:ev=>a.help=ev.target.value},
        Object.keys(HELP_LABELS).map(k=> el("option",{value:k, ...(a.help===k?{selected:""}:{})}, HELP_LABELS[k])))
    );
  }
  function redrawAw(){
    awBox.innerHTML="";
    e.awakenings.forEach((a,i)=> awBox.append(awRow(a,i)));
  }
  redrawAw();
  card.append(
    el("label",{style:"margin-top:14px"},"Night awakenings"),
    awBox,
    el("button",{class:"btn-ghost",onclick:()=>{ e.awakenings.push({time:"",dur:"",help:"none"}); redrawAw(); }},"+ Add an awakening")
  );

  /* naps (during the day before this night) */
  const napBox = el("div");
  function napRow(n, idx){
    return el("div",{class:"sub-item"},
      el("button",{class:"btn-danger rm",onclick:()=>{ e.naps.splice(idx,1); redrawNaps(); }},"Remove"),
      el("div",{class:"grid2"},
        el("div",null, el("label",null,"Into bed/crib"), el("input",{type:"time",value:n.inBed||"",oninput:ev=>n.inBed=ev.target.value})),
        el("div",null, el("label",null,"Fell asleep"), el("input",{type:"time",value:n.asleep||"",oninput:ev=>n.asleep=ev.target.value})),
        el("div",null, el("label",null,"Woke up"), el("input",{type:"time",value:n.woke||"",oninput:ev=>n.woke=ev.target.value})),
        el("div",null, el("label",null,"Out of bed/crib"), el("input",{type:"time",value:n.out||"",oninput:ev=>n.out=ev.target.value}))
      )
    );
  }
  function redrawNaps(){
    napBox.innerHTML="";
    e.naps.forEach((n,i)=> napBox.append(napRow(n,i)));
  }
  redrawNaps();
  card.append(
    el("label",{style:"margin-top:14px"},"Naps that day (before this bedtime)"),
    napBox,
    el("button",{class:"btn-ghost",onclick:()=>{ e.naps.push({inBed:"",asleep:"",woke:"",out:""}); redrawNaps(); }},"+ Add a nap")
  );

  card.append(
    el("label",{style:"margin-top:14px"},"Notes (illness, travel, anything unusual)"),
    el("textarea",{oninput:ev=>e.notes=ev.target.value}, e.notes||"")
  );

  const btns = el("div",{class:"btn-row"});
  btns.append(el("button",{class:"btn-secondary",onclick:()=>{ editing=null; renderDiary(); }},"Cancel"));
  if (existing) btns.append(el("button",{class:"btn-danger",onclick:()=>{
      if (confirm("Delete this night?")){ delete cur().entries[existing.date]; saveState(); editing=null; renderDiary(); $("#hdrSub").textContent=headerSub(); }
    }},"Delete"));
  btns.append(el("button",{class:"btn-primary",onclick:()=>{
    if (!e.date){ toast("Pick a date"); return; }
    if (!(e.lightsOut && e.onset && e.wake && e.outOfBed)){ toast("Fill in the four main times"); return; }
    /* guard against silently replacing an already-recorded night */
    const clobbers = cur().entries[e.date] && (!existing || existing.date !== e.date);
    if (clobbers && !confirm("The night of "+fmtDate(e.date)+" is already recorded. Replace it with this entry?")) return;
    e.awakenings = e.awakenings.filter(a=>a.time && a.dur!=="");
    e.naps = e.naps.filter(n=>n.asleep && n.woke);
    if (existing && existing.date !== e.date) delete cur().entries[existing.date];
    cur().entries[e.date] = e;
    saveState(); editing=null; renderDiary(); $("#hdrSub").textContent=headerSub();
    toast("Night saved");
  }},"Save night"));
  card.append(btns);
  return card;
}
/* ---------- chart (Mindell-style shaded log, noon -> noon) ----------
   Shared by the Chart tab and the print report. Colors come from CSS
   classes so they follow the light/dark theme (and print palette). */
function buildChartSVG(entries){
  /* W must fit inside the content column (main max-width minus card
     padding) so the full noon-to-noon axis is visible without horizontal
     scrolling on desktop; phones still scroll the wrap. */
  const LEFT = 58, RIGHT = 22, TOP = 26, ROWH = 26, GAP = 6;
  const W = 618, plotW = W - LEFT - RIGHT;
  const H = TOP + entries.length*(ROWH+GAP) + 14;
  const x = m => LEFT + (m/1440)*plotW;
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width", W); svg.setAttribute("height", H);
  svg.setAttribute("class","sleepchart");
  svg.setAttribute("role","img");
  svg.setAttribute("aria-label","Sleep chart: one row per day from noon to noon; dark bars are night sleep, light bars are naps. The same data appears as a table in the Summary tab.");
  svg.style.maxWidth = "none";
  function S(tag, attrs, text){
    const n = document.createElementNS(NS, tag);
    for (const k in attrs) n.setAttribute(k, attrs[k]);
    if (text!=null) n.textContent = text;
    return n;
  }
  const labels = ["Noon","2p","4p","6p","8p","10p","Mid","2a","4a","6a","8a","10a","Noon"];
  for (let i=0;i<=12;i++){
    const gx = x(i*120);
    svg.append(S("line",{class:"c-grid",x1:gx,y1:TOP-6,x2:gx,y2:H-10}));
    svg.append(S("text",{class:"c-glabel",x:gx,y:TOP-12,"text-anchor":"middle","font-size":10.5},labels[i]));
  }
  entries.forEach((e,ri)=>{
    const y = TOP + ri*(ROWH+GAP);
    const c = computeNight(e);
    svg.append(S("text",{class:"c-dlabel",x:LEFT-8,y:y+ROWH/2+4,"text-anchor":"end","font-size":11}, fmtDateShort(e.date)));
    svg.append(S("rect",{class:"c-rowbg",x:LEFT,y:y,width:plotW,height:ROWH}));
    if (!c.valid) return;
    (e.naps||[]).forEach(n=>{
      if (!(n.asleep && n.woke)) return;
      const s=mfn(n.asleep), w=mfn(n.woke); if (w<=s) return;
      svg.append(S("rect",{class:"c-nap",x:x(s),y:y+3,width:x(w)-x(s),height:ROWH-6,rx:2}));
    });
    let segs = [[c.on, c.wk]];
    (e.awakenings||[]).forEach(a=>{
      if (!(a.time && a.dur)) return;
      const t = mfn(a.time), t2 = t + Number(a.dur);
      segs = segs.flatMap(([s0,s1])=>{
        if (t2<=s0 || t>=s1) return [[s0,s1]];
        const out=[]; if (t>s0) out.push([s0,t]); if (t2<s1) out.push([t2,s1]); return out;
      });
    });
    segs.forEach(([s0,s1])=>{
      if (s1>s0) svg.append(S("rect",{class:"c-night",x:x(s0),y:y+3,width:x(s1)-x(s0),height:ROWH-6,rx:2}));
    });
    // arrows: down = into bed (lights out, nap in-bed), up = out of bed
    function arrow(m, up){
      const ax = x(m), y0 = up ? y+ROWH-2 : y+2, y1 = up ? y+6 : y+ROWH-6;
      const g = S("g",{class:"c-arrow"});
      g.append(S("line",{x1:ax,y1:y0,x2:ax,y2:y1}));
      const tip = up ? y+6 : y+ROWH-6, d = up ? 4 : -4;
      g.append(S("line",{x1:ax-3,y1:tip+d,x2:ax,y2:tip}));
      g.append(S("line",{x1:ax+3,y1:tip+d,x2:ax,y2:tip}));
      return g;
    }
    svg.append(arrow(c.lo,false), arrow(c.ob,true));
    (e.naps||[]).forEach(n=>{
      if (n.inBed) svg.append(arrow(mfn(n.inBed),false));
      if (n.out) svg.append(arrow(mfn(n.out),true));
    });
  });
  return svg;
}
function renderChart(){
  const v = $("#view-chart"); v.innerHTML = "";
  const entries = sortedEntries();
  const card = el("div",{class:"card"});
  card.append(el("h2",null,"Sleep chart", el("span",{class:"big"},"Each row is one day, noon to noon")));
  if (!entries.length){
    card.append(el("div",{class:"empty"},"Add a night in the Diary tab to see the chart."));
    v.append(card); return;
  }
  const wrap = el("div",{class:"chart-wrap"}); wrap.append(buildChartSVG(entries));
  card.append(wrap);
  card.append(el("div",{class:"legend"},
    el("span",null, el("span",{class:"sw night"}),"Night sleep"),
    el("span",null, el("span",{class:"sw nap"}),"Nap"),
    el("span",null,"↓ into bed · ↑ out of bed")
  ));
  v.append(card);
}

/* ---------- summary view ---------- */
function pmStat(v, label, sdv, fmt){
  const f = fmt || dur;
  return el("div",{class:"stat"},
    el("div",{class:"v"}, isNaN(v)? "—" : f(v),
      (sdv!=null && !isNaN(sdv)) ? el("span",{class:"pm"}," ± "+Math.round(sdv)+" min") : null),
    el("div",{class:"k"},label));
}
function renderSummary(){
  const v = $("#view-summary"); v.innerHTML = "";
  const s = computeSummary();
  const card = el("div",{class:"card"});
  card.append(el("h2",null,"Summary", s? el("span",{class:"big"}, s.n+" nights · "+fmtDate(s.first)+" – "+fmtDate(s.last)) : null));
  if (!s){ card.append(el("div",{class:"empty"},"No complete nights yet.")); v.append(card); return; }
  const sri = computeSRI();
  card.append(el("div",{class:"stat-grid"},
    pmStat(s.lightsOut.m,"Mean lights out",s.lightsOut.sd,clock),
    pmStat(s.onset.m,"Mean sleep onset",s.onset.sd,clock),
    pmStat(s.wake.m,"Mean wake time",s.wake.sd,clock),
    pmStat(s.mid.m,"Mean midsleep",s.mid.sd,clock),
    pmStat(s.sol.m,"Mean sleep latency",null),
    pmStat(s.tst.m,"Mean night sleep",s.tst.sd),
    pmStat(s.se.m,"Mean sleep efficiency",null,x=>x.toFixed(0)+"%"),
    pmStat(s.waso.m,"Mean WASO / night",null),
    el("div",{class:"stat"}, el("div",{class:"v"}, s.nAw.m.toFixed(1)), el("div",{class:"k"},"Awakenings per night ("+s.nAw.tot+" total)")),
    el("div",{class:"stat"}, el("div",{class:"v"}, s.nHelp.m.toFixed(1)), el("div",{class:"k"},"Parent interventions per night ("+s.nHelp.tot+" total)")),
    pmStat(s.napSleep.m,"Mean nap sleep / day",null),
    pmStat(s.tst24.m,"Mean 24-hour sleep",null),
    el("div",{class:"stat"}, el("div",{class:"v"}, sri==null? "—" : sri.toFixed(0)), el("div",{class:"k"},"Sleep Regularity Index (usually 0–100; needs consecutive days)"))
  ));
  const cmp = nsfCompare(s.tst24.m);
  if (cmp){
    card.append(el("div",{class:"nsf-flag "+cmp.cls},
      el("b",null,"24-hour sleep vs. age: "), cmp.text,
      el("div",{class:"hint",style:"margin-top:4px"}, cmp.band.label+" · "+NSF_CITATION)));
  }
  card.append(el("div",{class:"hint",style:"margin-top:8px"},
    "Bedtime/onset/wake variability is shown as ± SD. Sleep efficiency = night sleep ÷ time in bed."));
  v.append(card);

  // per-night table
  const tcard = el("div",{class:"card"});
  tcard.append(el("h2",null,"Night by night"));
  const sc = el("div",{class:"scrollx"}); sc.append(perNightTable(s));
  tcard.append(sc);
  v.append(tcard);
}
function perNightTable(s){
  const tbl = el("table",{class:"pernight"});
  tbl.append(el("tr",null, ["Date","Lights out","Asleep","Wake","Out","TST","SE","WASO","Wakes","Helped","Naps"].map(h=>el("th",null,h))));
  s.rows.forEach(r=>{
    tbl.append(el("tr",null,
      el("td",null,fmtDateShort(r.e.date)),
      el("td",null,clock(r.c.lo)), el("td",null,clock(r.c.on)),
      el("td",null,clock(r.c.wk)), el("td",null,clock(r.c.ob)),
      el("td",null,dur(r.c.tst)), el("td",null,isNaN(r.c.se)?"—":r.c.se.toFixed(0)+"%"),
      el("td",null,r.c.waso? dur(r.c.waso):"0"),
      el("td",null,String(r.c.nAw)), el("td",null,String(r.c.nHelp)),
      el("td",null, r.c.nNaps? r.c.nNaps+" ("+dur(r.c.napSleep)+")" : "0")
    ));
  });
  return tbl;
}

/* ---------- share view ---------- */
function buildTextReport(){
  const s = computeSummary();
  if (!s) return "No complete nights recorded yet.";
  const sri = computeSRI();
  const who = cur().settings.initials || "—";
  const L = [];
  L.push("PEDIATRIC SLEEP DIARY — SUMMARY");
  L.push("Child: "+who+"   Nights: "+s.n+"   "+fmtDate(s.first)+" to "+fmtDate(s.last));
  L.push("");
  L.push("AVERAGES (± SD where shown)");
  L.push("  Lights out:        "+clock(s.lightsOut.m)+(isNaN(s.lightsOut.sd)?"":"  (SD "+Math.round(s.lightsOut.sd)+" min)"));
  L.push("  Sleep onset:       "+clock(s.onset.m)+(isNaN(s.onset.sd)?"":"  (SD "+Math.round(s.onset.sd)+" min)"));
  L.push("  Sleep latency:     "+dur(s.sol.m));
  L.push("  Wake time:         "+clock(s.wake.m)+(isNaN(s.wake.sd)?"":"  (SD "+Math.round(s.wake.sd)+" min)"));
  L.push("  Midsleep:          "+clock(s.mid.m)+(isNaN(s.mid.sd)?"":"  (SD "+Math.round(s.mid.sd)+" min)"));
  L.push("  Night sleep (TST): "+dur(s.tst.m));
  L.push("  Time in bed:       "+dur(s.tib.m));
  L.push("  Sleep efficiency:  "+(isNaN(s.se.m)?"—":s.se.m.toFixed(0)+"%"));
  L.push("  WASO per night:    "+dur(s.waso.m));
  L.push("  Awakenings/night:  "+s.nAw.m.toFixed(1)+"  ("+s.nAw.tot+" total)");
  L.push("  Parent help/night: "+s.nHelp.m.toFixed(1)+"  ("+s.nHelp.tot+" total)");
  L.push("  Nap sleep per day: "+dur(s.napSleep.m)+"  ("+s.nNaps.m.toFixed(1)+" naps/day)");
  L.push("  24-h total sleep:  "+dur(s.tst24.m));
  if (sri!=null) L.push("  Sleep Regularity Index: "+sri.toFixed(0)+" / 100");
  const cmp = nsfCompare(s.tst24.m);
  if (cmp){
    L.push("");
    L.push("SLEEP NEED ("+cmp.band.label+")");
    L.push("  "+cmp.text);
    L.push("  "+NSF_CITATION);
  }
  L.push("");
  L.push("NIGHT BY NIGHT");
  L.push("  Date   LightsOut Asleep  Wake   OutBed  TST    SE   WASO Wakes Help Naps");
  s.rows.forEach(r=>{
    const c=r.c;
    const pad=(t,n)=>String(t).padEnd(n);
    L.push("  "+pad(fmtDateShort(r.e.date),7)+pad(clock(c.lo),10)+pad(clock(c.on),8)+pad(clock(c.wk),7)
      +pad(clock(c.ob),8)+pad(dur(c.tst),7)+pad(isNaN(c.se)?"—":c.se.toFixed(0)+"%",5)
      +pad(c.waso? c.waso+"m":"0",5)+pad(c.nAw,6)+pad(c.nHelp,5)
      +(c.nNaps? c.nNaps+" ("+dur(c.napSleep)+")":"0"));
  });
  const noted = s.rows.filter(r=>r.e.notes);
  if (noted.length){
    L.push(""); L.push("NOTES");
    noted.forEach(r=>L.push("  "+fmtDateShort(r.e.date)+": "+r.e.notes));
  }
  L.push("");
  L.push("Generated by Pediatric Sleep Diary (data entered by parent/caregiver).");
  return L.join("\n");
}
function buildCSV(){
  const rows = sortedEntries();
  const head = ["child_initials","date","lights_out","sleep_onset","final_wake","out_of_bed",
    "sol_min","tst_min","tib_min","se_pct","waso_min","n_awakenings","n_parent_interventions",
    "awakenings_detail","n_naps","nap_sleep_min","naps_detail","notes"];
  const esc = x => { x = (x==null?"":String(x)); return /[",\n]/.test(x) ? '"'+x.replace(/"/g,'""')+'"' : x; };
  const out = [head.join(",")];
  const who = cur().settings.initials || "";
  rows.forEach(e=>{
    const c = computeNight(e);
    const awd = (e.awakenings||[]).map(a=>a.time+" ("+a.dur+"m, "+(HELP_LABELS[a.help]||a.help)+")").join("; ");
    const npd = (e.naps||[]).map(n=>(n.inBed||"")+"/"+(n.asleep||"")+"-"+(n.woke||"")+"/"+(n.out||"")).join("; ");
    out.push([who, e.date, e.lightsOut, e.onset, e.wake, e.outOfBed,
      c.valid?Math.round(c.sol):"", c.valid?Math.round(c.tst):"", c.valid?Math.round(c.tib):"",
      c.valid&&!isNaN(c.se)?c.se.toFixed(1):"", c.valid?Math.round(c.waso):"",
      c.valid?c.nAw:"", c.valid?c.nHelp:"",
      awd, (e.naps||[]).length, c.valid?Math.round(c.napSleep):"", npd, e.notes||""
    ].map(esc).join(","));
  });
  return out.join("\n");
}

  }
  box.append(el("div",{class:"prfoot"},
    "Definitions: TST = total sleep time; SE = sleep efficiency (TST ÷ time in bed); WASO = wake after sleep onset; SRI = Sleep Regularity Index (Phillips et al., 5-min epochs, consecutive days). Generated by Pediatric Sleep Diary — no data leaves the family's device except reports they share."));
  window.print();
}

function renderShare(){
  const v = $("#view-share"); v.innerHTML = "";
  const card = el("div",{class:"card"});
  card.append(el("h2",null,"Share with your sleep clinic"));
  card.append(el("div",{class:"hint",style:"margin:0 0 10px"},
    "Copy the summary below and paste it into a MyChart message to your child's clinic, print or save a PDF report (includes the sleep chart), or attach the spreadsheet file to an email. Your diary never leaves this device until you do this."));
  const txt = buildTextReport();
  const pre = el("pre",{class:"export"}, txt);
  card.append(pre);
  card.append(el("div",{class:"btn-row"},
    el("button",{class:"btn-primary",onclick:async()=>{
      try { await navigator.clipboard.writeText(buildTextReport()); toast("Copied — paste into MyChart"); }
      catch(err){
        const r = document.createRange(); r.selectNodeContents(pre);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
        toast("Select-all done — copy manually");
      }
    }},"Copy summary")
  ));
  card.append(el("div",{class:"btn-row"},
    /* window.print() is unavailable inside the native webview; the share
       sheet + copy-summary cover the native path until a print plugin lands */
    IS_NATIVE ? null : el("button",{class:"btn-secondary",onclick:printReport},"Print / save PDF (with chart)"),
    el("button",{class:"btn-secondary",onclick:async()=>{
      const name = "sleep-diary-"+(cur().settings.initials||"child")+"-"+isoToday()+".csv";
      try { if (await shareFileNative(name, buildCSV())) return; }
      catch(err){ toast("Could not share the file"); return; }
      const blob = new Blob([buildCSV()],{type:"text/csv"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.append(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    }}, IS_NATIVE ? "Share CSV" : "Download CSV")
  ));
  v.append(card);

  /* ---- backup card ---- */
  const bk = el("div",{class:"card"});
  bk.append(el("h2",null,"Back up your diary"));
  const lastLocal = state.meta.lastBackupAt ? "Last backup file: "+new Date(state.meta.lastBackupAt).toLocaleString()+". " : "";
  bk.append(el("div",{class:"hint",style:"margin:0 0 10px"},
    "The diary lives only on this device. A backup protects it if the browser's data is cleared. "+lastLocal+
    "Backups stay in YOUR hands — a file you keep, or a file in your own Google Drive. Backups include all children on this device."));
  const fileBtns = el("div",{class:"btn-row"},
    el("button",{class:"btn-secondary",onclick:async()=>{
      const name = "sleep-diary-backup-"+isoToday()+".json";
      try {
        if (await shareFileNative(name, backupPayload())){
          state.meta.lastBackupAt = new Date().toISOString(); saveState();
          return;
        }
      } catch(err){ toast("Could not share the file"); return; }
      const blob = new Blob([backupPayload()],{type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.append(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
      state.meta.lastBackupAt = new Date().toISOString(); saveState();
      toast("Backup file saved");
    }}, IS_NATIVE ? "Share backup file" : "Save backup file"),
    el("button",{class:"btn-secondary",onclick:()=>{ $("#restoreFile").click(); }},"Restore from file")
  );
  const fileInput = el("input",{type:"file",id:"restoreFile",accept:".json,application/json",style:"display:none",
    onchange:async ev=>{
      const f = ev.target.files[0]; ev.target.value="";
      if (!f) return;
      try{
        const obj = JSON.parse(await f.text());
        const {added,updated} = applyBackup(obj);
        render(); toast("Restored: "+added+" added, "+updated+" updated");
      }catch(err){ alert(err.message || "That file could not be read."); }
    }});
  bk.append(fileBtns, fileInput);

  if (GOOGLE_CLIENT_ID){
    const last = state.drive.lastBackupAt
      ? "Last Drive backup: "+new Date(state.drive.lastBackupAt).toLocaleString()
      : "No Drive backup yet.";
    bk.append(el("div",{class:"hint",style:"margin-top:12px"}, last));
    bk.append(el("div",{class:"btn-row"},
      el("button",{class:"btn-secondary",onclick:async ev=>{
        const b = ev.target; b.disabled = true;
        try{ await driveBackup(); toast("Backed up to your Google Drive"); renderShare(); }
        catch(err){ alert(err.message); }
        b.disabled = false;
      }},"Back up to Google Drive"),
      el("button",{class:"btn-secondary",onclick:async ev=>{
        const b = ev.target; b.disabled = true;
        try{ const {added,updated} = await driveRestore(); render(); toast("Restored: "+added+" added, "+updated+" updated"); }
        catch(err){ alert(err.message); }
        b.disabled = false;
      }},"Restore from Google Drive")
    ));
    bk.append(el("div",{class:"hint",style:"margin-top:6px"},
      "Google access is limited to the one backup file this app creates — it cannot see anything else in your Drive."));
  } else {
    bk.append(el("div",{class:"hint",style:"margin-top:10px"},
      "Google Drive backup is available once the clinic configures it (set GOOGLE_CLIENT_ID in the app file)."));
  }
  v.append(bk);

  const danger = el("div",{class:"card"});
  danger.append(el("h2",null,"Start over"));
  danger.append(el("button",{class:"btn-danger",onclick:()=>{
    const who = cur().settings.initials || "this child";
    if (confirm("Erase all recorded nights for "+who+" from this device? This cannot be undone.")){
      cur().entries = {}; saveState(); render(); toast("Diary erased");
    }
  }},"Erase this child's diary data"));
  v.append(danger);
}

/* ============================================================
   Backup & restore
   ============================================================ */

/* ---- Google Drive backup (optional) ----
   To enable: create a Google Cloud project, configure an OAuth
   consent screen, create a Web OAuth client ID, add your hosting
   origin to "Authorized JavaScript origins", and paste the client
   ID below. Scope is drive.file only: the app can touch ONLY the
   one backup file it creates, nothing else in the parent's Drive. */
const GOOGLE_CLIENT_ID = "";   // e.g. "1234567890-abc.apps.googleusercontent.com"
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
const DRIVE_FILENAME = "pediatric-sleep-diary-backup.json";

function backupPayload(){
  return JSON.stringify({
    format:"peds-sleep-diary-backup", version:2,
    exported:new Date().toISOString(),
    activeChild: state.activeChild,
    children: state.children
  }, null, 1);
}
function applyBackup(obj){
  if (!obj || obj.format!=="peds-sleep-diary-backup")
    throw new Error("Not a sleep diary backup file.");
  let added=0, updated=0;
  const mergeEntries = (target, entries)=>{
    Object.values(entries||{}).forEach(e=>{
      if (!e || !e.date) return;
      if (target.entries[e.date]) updated++; else added++;
      target.entries[e.date]=e;
    });
  };
  if (obj.version>=2 && obj.children && typeof obj.children==="object"){
    Object.keys(obj.children).forEach(id=>{
      const src = obj.children[id];
      if (!src || typeof src!=="object") return;
      if (!state.children[id]){
        state.children[id] = blankChild();
        state.children[id].settings = Object.assign(blankChild().settings, src.settings||{});
      } else if (src.settings){
        if (src.settings.initials && !state.children[id].settings.initials)
          state.children[id].settings.initials = src.settings.initials;
        if (src.settings.ageBand && !state.children[id].settings.ageBand)
          state.children[id].settings.ageBand = src.settings.ageBand;
      }
      mergeEntries(state.children[id], src.entries);
    });
  } else if (typeof obj.entries==="object"){
    /* v1 backup: merge into the active child */
    mergeEntries(cur(), obj.entries);
    if (obj.settings && obj.settings.initials && !cur().settings.initials)
      cur().settings.initials = obj.settings.initials;
  } else {
    throw new Error("Not a sleep diary backup file.");
  }
  saveState();
  return {added, updated};
}

let gisLoaded = null;
function loadGIS(){
  if (gisLoaded) return gisLoaded;
  gisLoaded = new Promise((res,rej)=>{
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = ()=>res(); s.onerror = ()=>rej(new Error("Could not load Google sign-in. Check your connection."));
    document.head.append(s);
  });
  return gisLoaded;
}
function getDriveToken(){
  return new Promise(async (res,rej)=>{
    if (IS_NATIVE){
      rej(new Error("Google Drive backup isn't available in the app yet — use “Share backup file” instead."));
      return;
    }
    try { await loadGIS(); } catch(e){ rej(e); return; }
    if (!(window.google && google.accounts && google.accounts.oauth2)){
      rej(new Error("Google sign-in unavailable in this environment.")); return;
    }
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: t => t && t.access_token ? res(t.access_token) : rej(new Error("Sign-in was cancelled."))
    });
    tc.requestAccessToken();
  });
}
async function driveFindFile(token){
  if (state.drive.fileId){
    const r = await fetch("https://www.googleapis.com/drive/v3/files/"+state.drive.fileId+"?fields=id,trashed",
      {headers:{Authorization:"Bearer "+token}});
    if (r.ok){ const f = await r.json(); if (!f.trashed) return f.id; }
    state.drive.fileId = null;
  }
  const q = encodeURIComponent("name='"+DRIVE_FILENAME+"' and trashed=false");
  const r = await fetch("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id)",
    {headers:{Authorization:"Bearer "+token}});
  if (r.ok){ const d = await r.json(); if (d.files && d.files.length) return d.files[0].id; }
  return null;
}
async function driveBackup(){
  const token = await getDriveToken();
  let id = await driveFindFile(token);
  const body = backupPayload();
  let r;
  if (id){
    r = await fetch("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",
      {method:"PATCH", headers:{Authorization:"Bearer "+token, "Content-Type":"application/json"}, body});
  } else {
    const boundary = "pdsleep" + Date.now();
    const multi =
      "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+
      JSON.stringify({name:DRIVE_FILENAME, mimeType:"application/json"})+
      "\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+body+"\r\n--"+boundary+"--";
    r = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
      {method:"POST", headers:{Authorization:"Bearer "+token, "Content-Type":"multipart/related; boundary="+boundary}, body:multi});
  }
  if (!r.ok) throw new Error("Drive upload failed ("+r.status+").");
  const f = await r.json();
  if (f.id){ state.drive.fileId = f.id; }
  state.drive.lastBackupAt = new Date().toISOString();
  saveState();
}
async function driveRestore(){
  const token = await getDriveToken();
  const id = await driveFindFile(token);
  if (!id) throw new Error("No backup found in this Google account.");
  const r = await fetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media",
    {headers:{Authorization:"Bearer "+token}});
  if (!r.ok) throw new Error("Could not download the backup ("+r.status+").");
  return applyBackup(await r.json());
}

/* ---------- init ---------- */
(async function(){
  /* Ask the browser to keep our storage through cleanup passes. */
  try { if (navigator.storage && navigator.storage.persist) navigator.storage.persist(); } catch(e){}
  /* Offline support + installability (no-op on file://, in the native
     shell — which is already offline-capable — or unsupported). */
  if ("serviceWorker" in navigator && location.protocol.startsWith("http") && !IS_NATIVE){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
  await loadState();
  /* Write through immediately so IndexedDB (the durable store) holds the
     current state even if the user never edits this session. */
  KV.set(STORE_KEY, JSON.stringify(state));
  /* Re-assert the daily reminder in the native shell (survives OS cleanups). */
  if (IS_NATIVE && state.meta.reminder.enabled) applyReminder().catch(()=>{});
  render();
})();
</script>
